<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kabroda | Bounce Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/site.css">
    <style>
        :root { --bg-deep: #020617; var(--panel): #0f172a; var(--border): #334155; --green: #22c55e; var(--yellow): #eab308; var(--red): #ef4444; var(--white): #f8fafc; var(--gray): #94a3b8; }
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .radar-container { max-width: 1400px; margin: 0 auto; margin-top: 40px; }
        .radar-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 30px; }
        .radar-title { font-family: 'JetBrains Mono'; font-size: 32px; color: #a855f7; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .btn-scan { background: #a855f7; color: #fff; font-weight: 800; font-family: 'JetBrains Mono'; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: 0.2s; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .btn-scan:hover { background: #c084fc; }
        .radar-grid { display: grid; gap: 15px; }
        .radar-row { display: grid; grid-template-columns: 1fr 2fr 1fr; background: #0f172a; border: 1px solid #334155; padding: 20px 30px; border-radius: 6px; align-items: center; }
        .border-GREEN { border-left: 4px solid #22c55e; }
        .border-YELLOW { border-left: 4px solid #eab308; }
        .border-RED { border-left: 4px solid #ef4444; opacity: 0.6; }
        .sym-name { font-size: 24px; font-weight: 800; color: #fff; font-family: 'JetBrains Mono'; }
        .sym-price { font-size: 14px; color: #94a3b8; font-family: 'JetBrains Mono'; margin-top: 4px; }
        
        .copy-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 10px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-family: 'JetBrains Mono'; font-size: 12px; width: 100%; font-weight: 700;}
        .copy-btn:hover { background: #334155; color: #fff; border-color: #fff; }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(2, 6, 23, 0.95); backdrop-filter: blur(8px); z-index: 9999; overflow-y: auto; padding: 40px 20px; }
        .modal-content { max-width: 600px; margin: 0 auto; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 30px; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #ef4444; font-family: 'JetBrains Mono'; font-weight: 800; font-size: 16px; cursor: pointer; }
        .diag-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #1e293b; font-family: 'JetBrains Mono'; font-size: 13px; }
        .diag-label { color: #64748b; text-transform: uppercase; }
        .diag-val { font-weight: bold; color: #f8fafc; }
    </style>
</head>
<body>
    {% include 'nav.html' %}
    <div class="radar-container">
        <div class="radar-header">
            <div>
                <h2 class="radar-title">BOUNCE ENGINE <span style="font-size:14px; background:#1e293b; padding:4px 8px; border-radius:4px; vertical-align:middle; color:#94a3b8; font-family: 'Inter';">v14.0 (Exposed Diagnostics)</span></h2>
            </div>
            <button id="scanBtn" class="btn-scan" onclick="forceScan()">SCAN FLOORS & CEILINGS</button>
        </div>
        
        <div id="loading" style="display:none; text-align:center; padding:80px; color:#a855f7; font-family:'JetBrains Mono';">
            /// AUDITING SECTOR PHYSICS...
        </div>
        <div id="radarTargetGrid" class="radar-grid"></div>
    </div>

    <div id="diagModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <h2 style="font-family: 'Rajdhani'; color: #0ea5e9; margin-top: 0;" id="mSym">SYMBOL DIAGNOSTICS</h2>
            <div id="mReason" style="color: #cbd5e1; font-family: 'JetBrains Mono'; font-size: 12px; margin-bottom: 20px; background: rgba(14,165,233,0.1); padding: 10px; border-left: 2px solid #0ea5e9;"></div>
            <div id="diagContainer"></div>
        </div>
    </div>

    <script>
        window.bounceMemory = {};

        function openModal(symbol) {
            const data = window.bounceMemory[symbol];
            if (!data) return;
            
            document.getElementById('mSym').innerText = symbol + " RAW DIAGNOSTICS";
            
            let diagHtml = "";

            // --- INJECT FLIGHT PATH IF TRADE IS VALID ---
            if (data.plan && data.plan.valid) {
                diagHtml += `
                <div style="background: rgba(34, 197, 94, 0.1); border-left: 2px solid #22c55e; padding: 15px; margin-bottom: 20px; border-radius: 0 4px 4px 0;">
                    <div style="font-size:11px; color:#22c55e; font-family:'JetBrains Mono'; margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; font-weight:800;">>>> ACTIVE LIMIT ORDER <<<</div>
                    
                    <div class="diag-row" style="border-bottom: 1px solid rgba(34, 197, 94, 0.2);"><span class="diag-label">VECTOR</span><span class="diag-val" style="color:#22c55e;">${data.plan.bias}</span></div>
                    <div class="diag-row" style="border-bottom: 1px solid rgba(34, 197, 94, 0.2);"><span class="diag-label">LIMIT ENTRY</span><span class="diag-val" style="color:#fff;">$${data.plan.entry.toFixed(2)}</span></div>
                    <div class="diag-row" style="border-bottom: 1px solid rgba(34, 197, 94, 0.2);"><span class="diag-label">STOP LOSS</span><span class="diag-val" style="color:#ef4444;">$${data.plan.stop.toFixed(2)}</span></div>
                    <div class="diag-row" style="border-bottom: 1px solid rgba(34, 197, 94, 0.2);"><span class="diag-label">TARGET 1</span><span class="diag-val" style="color:#eab308;">$${data.plan.targets[0].toFixed(2)}</span></div>
                    <div class="diag-row" style="border-bottom: none;"><span class="diag-label">TARGET 2</span><span class="diag-val" style="color:#0ea5e9;">$${data.plan.targets[1].toFixed(2)}</span></div>
                </div>`;
            }

            diagHtml += `<div style="font-size:11px; color:#94a3b8; font-family:'JetBrains Mono'; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">RAW STRUCTURAL DIAGNOSTICS:</div>`;
            
            if (data.diagnostic_ledger && Object.keys(data.diagnostic_ledger).length > 0) {
                for (const [key, val] of Object.entries(data.diagnostic_ledger)) {
                    if(key === "rejection_reason") continue;
                    
                    let color = "#cbd5e1"; 
                    if (val === true) color = "#22c55e"; 
                    if (val === false) color = "#ef4444"; 
                    
                    let displayVal = typeof val === 'number' ? val.toFixed(2) : val.toString().toUpperCase();
                    
                    diagHtml += `
                    <div class="diag-row">
                        <span class="diag-label">${key.replace(/_/g, ' ')}</span>
                        <span class="diag-val" style="color:${color};">${displayVal}</span>
                    </div>`;
                }
            } else {
                diagHtml += "<div style='color:#94a3b8; font-family:monospace;'>No internal diagnostics found.</div>";
            }
            
            document.getElementById('diagContainer').innerHTML = diagHtml;
            document.getElementById('mReason').innerText = data.briefing || "N/A";
            document.getElementById('diagModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('diagModal').style.display = 'none';
        }

        async function forceScan() {
            const btn = document.getElementById('scanBtn'); 
            const grid = document.getElementById('radarTargetGrid'); 
            const loader = document.getElementById('loading');
            
            btn.disabled = true; grid.style.display = 'none'; loader.style.display = 'block';

            try {
                const res = await fetch('/api/bounce/scan', { method: 'POST' });
                const data = await res.json();
                let html = "";
                window.bounceMemory = {};

                data.results.forEach(t => {
                    window.bounceMemory[t.symbol] = t;
                    let borderTheme = t.color_code || "RED";
                    let displayGrade = t.grade;
                    let displaySubtext = t.briefing;
                    
                    html += `
                    <div class="radar-row border-${borderTheme}">
                        <div>
                            <div><span class="sym-name">${t.symbol}</span></div>
                            <div class="sym-price" style="margin-top: 8px;">Price: $${t.price.toFixed(2)}</div>
                        </div>

                        <div style="display:flex; flex-direction:column; justify-content:center; align-items:center;">
                            <div style="font-family:'Rajdhani'; font-size:20px; font-weight:800; color:var(--${borderTheme.toLowerCase()});">${displayGrade}</div>
                            <div style="font-size:11px; color:#94a3b8; font-family:'JetBrains Mono'; margin-top:4px; text-align:center; max-width:280px;">${displaySubtext}</div>
                        </div>

                        <div style="display:flex; justify-content:flex-end; align-items:center;">
                             <button class="copy-btn" onclick="openModal('${t.symbol}')">📋 RAW DATA</button>
                        </div>
                    </div>`;
                });
                grid.innerHTML = html;
            } catch(e) { console.log(e); } 
            finally { loader.style.display = 'none'; grid.style.display = 'grid'; btn.disabled = false; }
        }
        document.addEventListener('DOMContentLoaded', forceScan);
    </script>
</body>
</html>
