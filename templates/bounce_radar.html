<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kabroda Admin | Bounce Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/site.css">
    <style>
        :root { --panel: #0f172a; --border: #334155; }
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .radar-container { max-width: 1400px; margin: 0 auto; margin-top: 40px; }
        .radar-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .radar-title { font-family: 'JetBrains Mono'; font-size: 32px; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .btn-scan { background: #a855f7; color: #fff; font-weight: 800; font-family: 'JetBrains Mono'; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: 0.2s; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .btn-scan:hover { background: #d8b4fe; color:#000; }
        
        .radar-grid { display: grid; gap: 15px; }
        .radar-row { display: grid; grid-template-columns: 1fr 2fr 1fr; background: var(--panel); border: 1px solid var(--border); padding: 20px 30px; border-radius: 6px; align-items: center; }
        .border-GREEN { border-left: 4px solid #22c55e; } .border-YELLOW { border-left: 4px solid #eab308; } .border-GRAY { border-left: 4px solid #94a3b8; opacity:0.5; }
        
        .data-row { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 13px; border-bottom: 1px solid var(--border); padding: 4px 0; }
    </style>
</head>
<body>
    {% include 'nav.html' %}
    <div class="radar-container">
        <div class="radar-header">
            <div>
                <h2 class="radar-title" style="color:#a855f7;">Bounce Engine <span style="font-size:14px; background:#1e293b; color:#cbd5e1; padding:4px; border-radius:4px;">LIMIT ORDERS</span></h2>
            </div>
            <button id="scanBtn" class="btn-scan" onclick="forceScan()">SCAN FLOORS & CEILINGS</button>
        </div>
        <div id="loading" style="display:none; text-align:center; padding:80px; color:#a855f7; font-family:'JetBrains Mono';">/// SCANNING ALGORITHMIC STRUCTURE...</div>
        <div id="radarTargetGrid" class="radar-grid"></div>
    </div>

    <script>
        async function forceScan() {
            const btn = document.getElementById('scanBtn'); 
            const grid = document.getElementById('radarTargetGrid'); 
            const loader = document.getElementById('loading');
            
            btn.disabled = true; grid.style.display = 'none'; loader.style.display = 'block';

            try {
                const res = await fetch('/api/bounce/scan', { method: 'POST' });
                const data = await res.json();
                let html = "";

                data.results.forEach(t => {
                    let borderTheme = t.color_code || "GRAY";
                    
                    if (t.grade === "STAND DOWN") {
                        html += `
                        <div class="radar-row border-GRAY">
                            <div><div style="font-family:'JetBrains Mono'; font-size:24px; font-weight:800;">${t.symbol}</div><div style="color:#94a3b8; font-size:12px; margin-top:4px;">Price: $${t.price.toFixed(2)}</div></div>
                            <div style="text-align:center;"><div style="font-family:'Rajdhani'; font-size:20px; color:#ef4444; font-weight:800;">STAND DOWN</div><div style="font-family:'JetBrains Mono'; font-size:11px; color:#94a3b8;">${t.briefing}</div></div>
                            <div></div>
                        </div>`;
                    } else {
                        html += `
                        <div class="radar-row border-${borderTheme}">
                            <div><div style="font-family:'JetBrains Mono'; font-size:24px; font-weight:800;">${t.symbol}</div><div style="color:#22c55e; font-size:12px; margin-top:4px; font-family:'JetBrains Mono';">VECTOR: ${t.macro_bias}</div></div>
                            <div style="padding: 0 20px;">
                                <div style="font-family:'Rajdhani'; font-size:24px; color:var(--${borderTheme.toLowerCase()}); font-weight:800; text-align:center;">${t.grade}</div>
                                <div style="font-family:'JetBrains Mono'; font-size:11px; color:#94a3b8; text-align:center; margin-bottom:10px;">${t.briefing}</div>
                                <div class="data-row"><span style="color:#94a3b8;">LIMIT ENTRY</span><span style="color:#fff; font-weight:bold;">$${t.plan.entry.toFixed(2)}</span></div>
                                <div class="data-row"><span style="color:#94a3b8;">STOP LOSS</span><span style="color:#ef4444; font-weight:bold;">$${t.plan.stop.toFixed(2)}</span></div>
                                <div class="data-row"><span style="color:#94a3b8;">TARGET 1 (SCALE)</span><span style="color:#eab308; font-weight:bold;">$${t.plan.targets[0].toFixed(2)}</span></div>
                                <div class="data-row" style="border:none;"><span style="color:#94a3b8;">TARGET 2 (RUNNER)</span><span style="color:#0ea5e9; font-weight:bold;">$${t.plan.targets[1].toFixed(2)}</span></div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-family:'JetBrains Mono'; font-size:10px; color:#64748b; margin-bottom:5px;">DIAGNOSTICS</div>
                                <div style="font-family:'JetBrains Mono'; font-size:11px; color:#cbd5e1;">1H RSI: ${t.diagnostic_ledger['1h_rsi_fuel'].toFixed(2)}</div>
                                <div style="font-family:'JetBrains Mono'; font-size:11px; color:#cbd5e1;">15M 200 SMA: $${t.diagnostic_ledger['15m_200_sma'].toFixed(2)}</div>
                            </div>
                        </div>`;
                    }
                });
                grid.innerHTML = html || `<div style="text-align:center; padding:40px; color:#94a3b8;">No data returned.</div>`;
            } catch(e) { console.log(e); } 
            finally { loader.style.display = 'none'; grid.style.display = 'grid'; btn.disabled = false; }
        }
        document.addEventListener('DOMContentLoaded', forceScan);
    </script>
</body>
</html>
