<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kabroda | Gravity Map</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/site.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; }
        .map-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #334155; }
        .h-title { font-family: 'JetBrains Mono'; font-size: 24px; font-weight: 800; margin: 0; color: #fff; text-transform: uppercase; letter-spacing: 2px;}
        .container { display: flex; height: calc(100vh - 80px); }
        #chart-container { flex: 1; border-right: 1px solid #334155; position: relative;}
        .sidebar { width: 450px; background: #0f172a; padding: 20px; overflow-y: auto; box-sizing: border-box;}
        
        .zone-card { background: #1e293b; border: 1px solid #334155; padding: 15px; margin-bottom: 15px; border-radius: 6px; }
        .zone-MAXIMUM { border-left: 4px solid #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.1); }
        .zone-HEAVY { border-left: 4px solid #eab308; }
        .zone-LIGHT { border-left: 4px solid #3b82f6; }
        
        .fib-card { background: rgba(168, 85, 247, 0.1); border: 1px solid #a855f7; border-left: 4px solid #a855f7; padding: 15px; margin-bottom: 20px; border-radius: 6px; }
        
        .z-price { font-family: 'JetBrains Mono'; font-size: 18px; font-weight: 800; color: #fff; }
        .z-score { float: right; font-family: 'Rajdhani'; font-size: 16px; font-weight: 800; color: #94a3b8; }
        .z-desc { font-size: 12px; color: #94a3b8; margin-top: 8px; line-height: 1.4; }
    </style>
</head>
<body>
    {% include 'nav.html' %}
    
    <div class="map-header">
        <h1 class="h-title">Historical Gravity Map <span style="font-size:12px; color:#0ea5e9;">[STRUCTURAL CONFLUENCE]</span></h1>
        <select id="symSelect" style="padding: 10px; background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 4px; font-family: 'JetBrains Mono';" onchange="loadGrid()">
            <option value="BTC/USDT">BTC/USDT</option>
            <option value="ETH/USDT">ETH/USDT</option>
            <option value="SOL/USDT">SOL/USDT</option>
        </select>
    </div>

    <div class="container">
        <div id="chart-container"></div>
        <div class="sidebar" id="sidebar-zones">
            <div style="text-align:center; padding: 40px; color: #94a3b8; font-family: 'JetBrains Mono';">SCANNING GRAVITY WELLS...</div>
        </div>
    </div>

    <script>
        let chart, candlestickSeries;
        
        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { type: 'solid', color: '#020617' }, textColor: '#cbd5e1' },
                grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: '#334155' },
                timeScale: { borderColor: '#334155', timeVisible: true }
            });
            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#22c55e', downColor: '#ef4444', borderVisible: false, wickUpColor: '#22c55e', wickDownColor: '#ef4444'
            });
        }

        async function fetchCandles(symbol) {
            const sym = symbol.replace('/', '');
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=15m&limit=300`);
            const data = await res.json();
            return data.map(d => ({ time: d[0]/1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]) }));
        }

        async function loadGrid() {
            const sym = document.getElementById('symSelect').value;
            const sidebar = document.getElementById('sidebar-zones');
            sidebar.innerHTML = `<div style="text-align:center; padding: 40px; color: #0ea5e9; font-family: 'JetBrains Mono';">/// CALCULATING MASS & MACRO FIBS...</div>`;
            
            // Render Live Chart
            const candles = await fetchCandles(sym);
            candlestickSeries.setData(candles);

            // Fetch Data
            const res = await fetch(`/api/gravity/scan?symbol=${sym}`);
            const data = await res.json();
            
            sidebar.innerHTML = '';
            
            // Render Fibs First (Layer 3)
            if (data.macro_fibs && data.macro_fibs.swing_high) {
                const f = data.macro_fibs;
                
                // Draw Fib Lines
                candlestickSeries.createPriceLine({ price: f.swing_high, color: '#f8fafc', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, title: 'MACRO HIGH' });
                candlestickSeries.createPriceLine({ price: f.swing_low, color: '#f8fafc', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, title: 'MACRO LOW' });
                candlestickSeries.createPriceLine({ price: f.fib_0500, color: '#a855f7', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dotted, title: '0.500 POCKET' });
                candlestickSeries.createPriceLine({ price: f.fib_0618, color: '#eab308', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dotted, title: '0.618 POCKET' });
                candlestickSeries.createPriceLine({ price: f.fib_0786, color: '#ef4444', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dotted, title: '0.786 DEEP' });
                
                sidebar.innerHTML += `
                <div class="fib-card">
                    <div style="color:#a855f7; font-family:'JetBrains Mono'; font-weight:800; font-size:14px; margin-bottom:10px;">MACRO ANCHORS (30-DAY)</div>
                    <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono'; font-size:12px; color:#fff;">
                        <span>HIGH: $${f.swing_high}</span>
                        <span>LOW: $${f.swing_low}</span>
                    </div>
                    <div style="height:1px; background:#a855f7; opacity:0.3; margin:10px 0;"></div>
                    <div style="font-family:'JetBrains Mono'; font-size:13px; color:#cbd5e1; line-height:1.6;">
                        <span style="color:#a855f7;">0.500:</span> $${f.fib_0500} <br>
                        <span style="color:#eab308;">0.618:</span> $${f.fib_0618} (Golden)<br>
                        <span style="color:#ef4444;">0.786:</span> $${f.fib_0786} (Deep)
                    </div>
                </div>`;
            }
            
            // Render Heatmap
            if(!data.heatmap || data.heatmap.length === 0) {
                sidebar.innerHTML += `<div style="padding:20px; color:#94a3b8; font-family:'Inter';">No structural trauma logged in vault yet. Engine is running.</div>`;
                return;
            }

            data.heatmap.forEach(zone => {
                let boxColor = 'rgba(59, 130, 246, 0.1)'; 
                if(zone.intensity === 'HEAVY') boxColor = 'rgba(234, 179, 8, 0.2)'; 
                if(zone.intensity === 'MAXIMUM') boxColor = 'rgba(239, 68, 68, 0.2)'; 

                candlestickSeries.createPriceLine({ price: zone.top, color: boxColor, lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Solid, title: 'ZONE TOP' });
                candlestickSeries.createPriceLine({ price: zone.bottom, color: boxColor, lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Solid, title: 'ZONE BOT' });

                let guardBadge = zone.contains_guardrail ? `<span style="background:#ef4444; color:#fff; padding:2px 6px; border-radius:4px; font-size:10px; margin-left:8px;">4H GUARDRAIL</span>` : '';
                
                sidebar.innerHTML += `
                <div class="zone-card zone-${zone.intensity}">
                    <div>
                        <span class="z-price">$${zone.bottom.toFixed(2)} - $${zone.top.toFixed(2)}</span>
                        <span class="z-score">HEAT: ${zone.heat_score}</span>
                    </div>
                    <div style="margin-top:5px;">${guardBadge} <span style="font-size:10px; color:#94a3b8;">${zone.level_count} Clustered Levels</span></div>
                    <div class="z-desc">Contributors: ${zone.contributors.join(', ')}</div>
                </div>`;
            });
        }

        window.addEventListener('resize', () => { chart.applyOptions({ width: document.getElementById('chart-container').clientWidth, height: document.getElementById('chart-container').clientHeight }); });
        document.addEventListener('DOMContentLoaded', () => { initChart(); loadGrid(); });
    </script>
</body>
</html>
