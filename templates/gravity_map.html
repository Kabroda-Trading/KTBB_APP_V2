<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kabroda | Gravity Map</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/site.css">
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* THE BOXED WORKSPACE */
        .workspace-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            overflow: hidden;
        }

        .map-container {
            width: 100%;
            max-width: 1600px;
            height: 100%;
            max-height: 850px; /* Locked height to prevent vertical spill */
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 12px;
            display: flex;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* HEADER ADJUSTMENTS */
        .map-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 30px; 
            background: #0f172a;
            border-bottom: 1px solid #334155; 
        }
        .h-title { font-family: 'JetBrains Mono'; font-size: 20px; font-weight: 800; margin: 0; color: #fff; text-transform: uppercase; letter-spacing: 2px;}

        /* CHART & SIDEBAR BOXING */
        #chart-container { flex: 1; position: relative; background: #020617; }
        .sidebar { 
            width: 420px; 
            background: #0f172a; 
            padding: 20px; 
            overflow-y: auto; 
            box-sizing: border-box;
            border-left: 1px solid #334155;
        }
        
        /* SCROLLBAR STYLING */
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: #0f172a; }
        .sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* INTEL CARDS */
        .zone-card { background: #1e293b; border: 1px solid #334155; padding: 15px; margin-bottom: 12px; border-radius: 6px; border-left: 4px solid #3b82f6; transition: transform 0.2s; }
        .zone-card:hover { transform: translateX(4px); background: #243146; }
        .zone-MAXIMUM { border-left-color: #ef4444; }
        .zone-HEAVY { border-left-color: #eab308; }
        
        .fib-card { background: rgba(168, 85, 247, 0.1); border: 1px solid #a855f7; border-left: 4px solid #a855f7; padding: 15px; margin-bottom: 20px; border-radius: 6px; }
        .z-price { font-family: 'JetBrains Mono'; font-size: 16px; font-weight: 800; color: #fff; }
        .z-score { float: right; font-family: 'Rajdhani'; font-size: 14px; font-weight: 800; color: #94a3b8; }
        .z-desc { font-size: 11px; color: #94a3b8; margin-top: 6px; line-height: 1.4; }
    </style>
</head>
<body>
    {% include 'nav.html' %}
    
    <div class="workspace-wrapper">
        <div class="map-container">
            <div id="chart-container">
                <div class="map-header">
                    <h1 class="h-title">Gravity Map <span style="font-size:10px; color:#0ea5e9;">[SYSTEMATIC STRUCTURAL CLUSTERS]</span></h1>
                    <select id="symSelect" style="padding: 6px 12px; background: #1e293b; color: #fff; border: 1px solid #475569; border-radius: 4px; font-family: 'JetBrains Mono'; font-size: 12px;" onchange="loadGrid()">
                        <option value="BTC/USDT">BTC/USDT</option>
                        <option value="ETH/USDT">ETH/USDT</option>
                        <option value="SOL/USDT">SOL/USDT</option>
                    </select>
                </div>
            </div>
            <div class="sidebar" id="sidebar-zones">
                <div style="text-align:center; padding: 40px; color: #94a3b8; font-family: 'JetBrains Mono'; font-size: 12px;">SYNCHRONIZING WITH VAULT...</div>
            </div>
        </div>
    </div>

    <script>
        let chart, candlestickSeries;
        
        function initChart() {
            const container = document.getElementById('chart-container');
            const header = document.querySelector('.map-header');
            
            // Calculate height subtracting the internal header
            const chartHeight = container.clientHeight - header.offsetHeight;

            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: chartHeight,
                layout: { background: { type: 'solid', color: '#020617' }, textColor: '#cbd5e1' },
                grid: { vertLines: { color: '#161e2e' }, horzLines: { color: '#161e2e' } },
                rightPriceScale: { borderColor: '#334155', autoScale: true },
                timeScale: { borderColor: '#334155', timeVisible: true }
            });

            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#22c55e', downColor: '#ef4444', borderVisible: false, wickUpColor: '#22c55e', wickDownColor: '#ef4444'
            });
        }

        async function loadGrid() {
            const sym = document.getElementById('symSelect').value;
            const sidebar = document.getElementById('sidebar-zones');
            sidebar.innerHTML = `<div style="text-align:center; padding: 40px; color: #0ea5e9; font-family: 'JetBrains Mono'; font-size: 12px;">/// SCANNING STRUCTURAL SCARS...</div>`;
            
            try {
                const res = await fetch(`/api/gravity/scan?symbol=${encodeURIComponent(sym)}`);
                const data = await res.json();
                sidebar.innerHTML = '';
                
                if (data.macro_fibs && data.macro_fibs.chart_data) {
                    candlestickSeries.setData(data.macro_fibs.chart_data);
                    chart.timeScale().fitContent();
                }
                
                if (data.macro_fibs && data.macro_fibs.swing_high) {
                    const f = data.macro_fibs;
                    sidebar.innerHTML += `
                    <div class="fib-card">
                        <div style="color:#a855f7; font-family:'JetBrains Mono'; font-weight:800; font-size:12px; margin-bottom:8px;">MACRO ANCHORS (30D)</div>
                        <div style="font-family:'JetBrains Mono'; font-size:12px; color:#cbd5e1;">
                            0.500: $${f.fib_0500}<br>
                            0.618: $${f.fib_0618}
                        </div>
                    </div>`;
                }
                
                if (data.heatmap && data.heatmap.length > 0) {
                    data.heatmap.forEach(zone => {
                        sidebar.innerHTML += `
                        <div class="zone-card zone-${zone.intensity}">
                            <div><span class="z-price">$${zone.bottom.toFixed(2)}</span><span class="z-score">HEAT: ${zone.heat_score}</span></div>
                            <div class="z-desc">${zone.contributors.join(' + ')}</div>
                        </div>`;
                    });
                } else {
                    sidebar.innerHTML += `<div style="padding:20px; color:#64748b; font-family:'Inter'; font-size:12px;">Memory Vault is currently recording. Full structural confluence clusters will manifest as the engine logs daily pivots.</div>`;
                }
                
            } catch(e) {
                sidebar.innerHTML = `<div style="color:#ef4444; padding:20px;">SYSTEM ERROR: Check Logs.</div>`;
            }
        }

        window.addEventListener('resize', () => { 
            const container = document.getElementById('chart-container');
            const header = document.querySelector('.map-header');
            chart.applyOptions({ width: container.clientWidth, height: container.clientHeight - header.offsetHeight }); 
        });

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { initChart(); loadGrid(); }, 150);
        });
    </script>
</body>
</html>
