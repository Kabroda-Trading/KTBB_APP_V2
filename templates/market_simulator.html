<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kabroda | Market Simulator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/site.css">
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { border-bottom: 1px solid #1e293b; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .sim-grid { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }
        .panel { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; color: #94a3b8; font-size: 11px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
        select, input { width: 100%; background: #050b14; border: 1px solid #334155; color: #fff; padding: 10px; border-radius: 6px; font-family: 'Inter'; font-size: 13px; }
        
        .divider { border-top: 1px solid #334155; margin: 20px 0 15px 0; }
        .section-title { color: #facc15; font-size: 12px; font-weight: 800; letter-spacing: 1px; margin-bottom: 10px; display: block; text-transform: uppercase; }
        
        .btn-run { background: #facc15; color: #000; width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; margin-top: 20px; font-size: 14px;}
        .btn-run:hover { background: #fbbf24; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #1e293b; padding: 15px; border-radius: 8px; text-align: center; border-bottom: 4px solid #334155; }
        .stat-val { font-size: 24px; font-weight: 800; display: block; color: #fff; font-family: 'JetBrains Mono'; }
        .stat-label { font-size: 11px; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        
        .log-row { background: #1e293b; margin-bottom: 8px; padding: 12px; border-radius: 6px; border-left: 4px solid #64748b; font-family: 'JetBrains Mono'; font-size: 12px; }
        .text-green { color: #10b981; }
        .text-red { color: #ef4444; }
        .text-yellow { color: #facc15; }
    </style>
</head>
<body>
    
    {% include 'nav.html' %}

    <div class="container" style="padding-top:40px;">
        <div class="header">
            <div>
                <h1 style="color: #facc15;">MARKET SIMULATOR <span style="font-size: 14px; opacity: 0.6; color: #fff;">1:1 RADAR ENGINE</span></h1>
            </div>
            <a href="/suite" style="color:#94a3b8; text-decoration:none; font-weight:bold; font-size: 14px;">← BACK TO SUITE</a>
        </div>

        <div class="sim-grid">
            <div class="panel">
                <span class="section-title">DATA SELECTION</span>
                <div class="control-group">
                    <label>ASSET</label>
                    <select id="symbol">
                        <option value="BTCUSDT">BTC/USDT</option>
                        <option value="ETHUSDT">ETH/USDT</option>
                        <option value="SOLUSDT">SOL/USDT</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>TEST WINDOW (UTC)</label>
                    <input type="date" id="startDate" style="margin-bottom:10px;">
                    <input type="date" id="endDate">
                </div>

                <div class="divider"></div>
                <span class="section-title">WHAT-IF SCENARIOS (RADAR OVERRIDES)</span>
                
                <div class="control-group">
                    <label style="display:flex; align-items:center; gap:8px;">
                        <input type="checkbox" id="useCustomGaps" style="width:auto;"> Enable Gap Overrides
                    </label>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="control-group">
                        <label>Min Gap %</label>
                        <input type="number" step="0.1" id="minGap" value="0.5">
                    </div>
                    <div class="control-group">
                        <label>Max Primal %</label>
                        <input type="number" step="0.1" id="maxPrimal" value="1.5">
                    </div>
                    <div class="control-group">
                        <label>Max Exhaust %</label>
                        <input type="number" step="0.1" id="maxExhaust" value="2.25">
                    </div>
                    <div class="control-group">
                        <label>Jailbreaks?</label>
                        <select id="allowJb">
                            <option value="true">YES</option>
                            <option value="false">NO</option>
                        </select>
                    </div>
                </div>

                <div class="divider"></div>
                <span class="section-title">EXECUTION RULES</span>
                <div class="control-group">
                    <label>ENTRY LOGIC</label>
                    <select id="entryStyle">
                        <option value="15m_close">15-Minute Candle Close Outside Trigger</option>
                        <option value="pullback">15-Min Close + Wait for Pullback to Line</option>
                        <option value="instant">Instant Trigger Cross (Limit Order)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>STOP LOSS</label>
                    <select id="stopStyle">
                        <option value="radar_default">Market Radar Default</option>
                        <option value="15m_candle">Aggressive (Edge of 15m Entry Candle)</option>
                    </select>
                </div>

                <button onclick="runSimulation()" class="btn-run" id="runBtn">INITIATE SIMULATION</button>
                <div id="loader" style="display:none; text-align:center; margin-top:20px; color:#facc15; font-weight:bold; font-size:12px;">SIMULATING HISTORICAL TRADES...</div>
            </div>

            <div id="results" style="display:none;">
                <div class="stat-grid">
                    <div class="stat-card" style="border-color: #10b981;">
                        <span class="stat-label">T1 REACHED (S/R)</span>
                        <span class="stat-val text-green" id="t1Rate">0%</span>
                    </div>
                    <div class="stat-card" style="border-color: #06b6d4;">
                        <span class="stat-label">T2 REACHED (POLE)</span>
                        <span class="stat-val text-green" id="t2Rate">0%</span>
                    </div>
                    <div class="stat-card" style="border-color: #a855f7;">
                        <span class="stat-label">T3 REACHED (1.618)</span>
                        <span class="stat-val text-green" id="t3Rate">0%</span>
                    </div>
                    <div class="stat-card" style="border-color: #ef4444;">
                        <span class="stat-label">STOPPED OUT</span>
                        <span class="stat-val text-red" id="stopRate">0%</span>
                    </div>
                </div>

                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px; color:#94a3b8; font-weight:bold; padding: 0 10px;">
                    <span id="tradesCount">0 Total Executions</span>
                    <span id="skippedCount" style="color:#facc15;">0 Trades Skipped by Radar</span>
                </div>

                <div class="panel" style="padding:0;">
                    <div id="btLogArea" style="height:650px; overflow-y:auto; padding:15px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const t = new Date();
            document.getElementById('endDate').valueAsDate = t;
            const p = new Date(); p.setDate(t.getDate()-30);
            document.getElementById('startDate').valueAsDate = p;
        }

        async function runSimulation() {
            const btn = document.getElementById('runBtn');
            const loader = document.getElementById('loader');
            btn.disabled = true; loader.style.display = 'block';
            document.getElementById('results').style.display = 'none';

            const payload = {
                symbol: document.getElementById('symbol').value,
                start_date_utc: document.getElementById('startDate').value,
                end_date_utc: document.getElementById('endDate').value,
                session_ids: ["us_ny_futures"],
                
                entry_style: document.getElementById('entryStyle').value,
                stop_style: document.getElementById('stopStyle').value,
                
                use_custom_gaps: document.getElementById('useCustomGaps').checked,
                min_gap: document.getElementById('minGap').value,
                primal_max: document.getElementById('maxPrimal').value,
                exhaust_max: document.getElementById('maxExhaust').value,
                allow_jb: document.getElementById('allowJb').value === "true"
            };

            try {
                const resp = await fetch('/api/simulator/run', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                
                if(!data.ok) throw new Error(data.error);

                const s = data.stats;
                const total = s.total_trades || 1;
                
                document.getElementById('t1Rate').innerText = Math.round((s.wins_t1/total)*100) + '%';
                document.getElementById('t2Rate').innerText = Math.round((s.wins_t2/total)*100) + '%';
                document.getElementById('t3Rate').innerText = Math.round((s.wins_t3/total)*100) + '%';
                document.getElementById('stopRate').innerText = Math.round((s.stops/total)*100) + '%';
                
                document.getElementById('tradesCount').innerText = `${s.total_trades} Executions`;
                document.getElementById('skippedCount').innerText = `${s.skipped} Skipped by Radar`;

                let html = "";
                data.log.forEach(r => {
                    let border = r.status.includes('STOP') ? '#ef4444' : (r.status.includes('HIT') ? '#10b981' : '#64748b');
                    html += `
                        <div class="log-row" style="border-left-color:${border}">
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <span style="color:#facc15; font-weight:700;">${r.date}</span>
                                <span style="color:${border}; font-weight:bold;">${r.status}</span>
                            </div>
                            <div style="color:#94a3b8;">${r.msg}</div>
                        </div>
                    `;
                });
                document.getElementById('btLogArea').innerHTML = html;
                document.getElementById('results').style.display = 'block';

            } catch(e) {
                alert("Simulation Error: " + e.message);
            } finally {
                btn.disabled = false; loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
