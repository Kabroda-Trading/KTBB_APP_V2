<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kabroda | Morning Brief</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Rajdhani:wght@600;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/site.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg:       #050505;
            --surface:  #0a0a0a;
            --border:   #1e1e1e;
            --border2:  #2a2a2a;
            --green:    #22c55e;
            --red:      #ef4444;
            --amber:    #f59e0b;
            --blue:     #0ea5e9;
            --purple:   #a855f7;
            --text:     #f1f5f9;
            --muted:    #94a3b8;
            --dim:      #475569;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .page-wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 48px 32px 80px;
            width: 100%;
            box-sizing: border-box;
        }

        /* ── PAGE HEADER ─────────────────────────────────── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--border2);
            padding-bottom: 20px;
            margin-bottom: 48px;
        }
        .page-title {
            font-family: 'JetBrains Mono';
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .page-date {
            font-family: 'JetBrains Mono';
            font-size: 12px;
            color: var(--dim);
        }

        /* ── SECTION 1: THE NARRATIVE ────────────────────── */
        .narrative-block {
            margin-bottom: 48px;
        }
        .narrative-text {
            font-size: 18px;
            font-weight: 300;
            line-height: 1.75;
            color: #e2e8f0;
            letter-spacing: 0.01em;
        }
        .narrative-stale {
            display: inline-block;
            font-family: 'JetBrains Mono';
            font-size: 10px;
            color: var(--amber);
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.25);
            padding: 2px 8px;
            border-radius: 3px;
            margin-bottom: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .narrative-placeholder {
            font-size: 16px;
            font-weight: 300;
            line-height: 1.75;
            color: var(--dim);
            font-style: italic;
        }

        /* ── SECTION 2: WAVE STATE BAR ───────────────────── */
        .wave-bar {
            display: flex;
            align-items: center;
            gap: 24px;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-left: 3px solid var(--amber);
            border-radius: 8px;
            padding: 18px 24px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .wave-label-pill {
            font-family: 'JetBrains Mono';
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--amber);
            background: rgba(245,158,11,0.08);
            border: 1px solid rgba(245,158,11,0.25);
            padding: 4px 10px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .wave-status-pill {
            font-family: 'JetBrains Mono';
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--green);
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .wave-completion {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 160px;
        }
        .completion-bar-wrap {
            flex: 1;
            background: var(--border2);
            border-radius: 3px;
            height: 6px;
            overflow: hidden;
        }
        .completion-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--amber), #f97316);
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        .completion-pct {
            font-family: 'JetBrains Mono';
            font-size: 13px;
            font-weight: 700;
            color: var(--amber);
            white-space: nowrap;
        }
        .wave-levels {
            font-family: 'JetBrains Mono';
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
        }
        .wave-levels .origin { color: var(--green); }
        .wave-levels .arrow  { color: var(--dim); margin: 0 4px; }
        .wave-levels .target { color: var(--text); }
        .wave-invalidation {
            font-family: 'JetBrains Mono';
            font-size: 11px;
            color: var(--red);
            white-space: nowrap;
        }

        /* ── SECTION 3: JEWEL STATUS ─────────────────────── */
        .jewel-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 18px 24px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }
        .jewel-gate-open {
            font-family: 'JetBrains Mono';
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--green);
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.3);
            padding: 6px 14px;
            border-radius: 5px;
            text-transform: uppercase;
        }
        .jewel-gate-closed {
            font-family: 'JetBrains Mono';
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--dim);
            background: rgba(71,85,105,0.12);
            border: 1px solid var(--border2);
            padding: 6px 14px;
            border-radius: 5px;
            text-transform: uppercase;
        }
        .jewel-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .jewel-chip {
            font-family: 'JetBrains Mono';
            font-size: 11px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 4px;
            border: 1px solid;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chip-dir-bull  { color: var(--green); border-color: rgba(34,197,94,0.3);  background: rgba(34,197,94,0.07);  }
        .chip-dir-bear  { color: var(--red);   border-color: rgba(239,68,68,0.3);  background: rgba(239,68,68,0.07);  }
        .chip-dir-neut  { color: var(--muted); border-color: var(--border2);       background: transparent; }
        .chip-conv-str  { color: var(--blue);  border-color: rgba(14,165,233,0.3); background: rgba(14,165,233,0.07); }
        .chip-conv-mod  { color: var(--amber); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.07); }
        .chip-conv-low  { color: var(--dim);   border-color: var(--border2);       background: transparent; }
        .chip-warn-exit { color: #fff;         border-color: var(--red);           background: rgba(239,68,68,0.15);  }
        .chip-warn-div  { color: #fff;         border-color: var(--amber);         background: rgba(245,158,11,0.15); }
        .jewel-summary {
            flex: 1;
            font-size: 13px;
            color: var(--muted);
            font-style: italic;
            min-width: 200px;
        }

        /* ── SECTION 4: THE TACTICAL SETUP ──────────────── */
        .section-label {
            font-family: 'JetBrains Mono';
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 16px;
        }
        .tactical-block {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 48px;
        }
        .tactical-content {
            font-size: 14px;
            line-height: 1.7;
            color: #cbd5e1;
            white-space: pre-wrap;
            font-family: 'Inter', sans-serif;
        }
        .tactical-content .starred-line {
            color: var(--green);
            font-weight: 600;
            font-size: 15px;
        }

        /* ── SECTION 5: OPERATOR COMMLINK ────────────────── */
        .commlink-wrap {
            margin-bottom: 48px;
        }
        .commlink-terminal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-left: 3px solid var(--purple);
            border-radius: 8px;
            padding: 24px;
        }
        .chat-window {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 14px;
            min-height: 200px;
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-bubble {
            padding: 10px 14px;
            border-radius: 6px;
            max-width: 88%;
            line-height: 1.55;
            font-size: 14px;
        }
        .chat-user { background: #1e293b; color: #fff; align-self: flex-end; border-bottom-right-radius: 0; }
        .chat-analyst { background: rgba(168,85,247,0.08); color: #d8b4fe; align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid rgba(168,85,247,0.2); }
        .chat-input-row { display: flex; gap: 10px; }
        .chat-input {
            flex: 1; background: var(--bg); border: 1px solid var(--border2);
            color: #fff; padding: 11px 14px; border-radius: 5px;
            font-family: 'Inter'; font-size: 14px; outline: none;
        }
        .chat-input:focus { border-color: var(--purple); }
        .chat-send {
            background: var(--purple); color: #000; border: none;
            padding: 0 22px; font-weight: 800; font-family: 'JetBrains Mono';
            border-radius: 5px; cursor: pointer; font-size: 12px;
            letter-spacing: 1px; transition: 0.2s;
        }
        .chat-send:hover { background: #d8b4fe; }

        /* ── SECTION 6: PERFORMANCE NOTE ─────────────────── */
        .perf-note-wrap { margin-bottom: 48px; }
        .collapsible-toggle {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-family: 'JetBrains Mono';
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            transition: 0.15s;
        }
        .collapsible-toggle:hover { border-color: var(--border2); color: var(--text); }
        .collapsible-body {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 20px 24px;
            display: none;
        }
        .collapsible-body.open { display: block; }
        .perf-note-content { font-size: 14px; line-height: 1.7; color: #cbd5e1; }
        .perf-note-content h1, .perf-note-content h2, .perf-note-content h3 {
            font-family: 'Rajdhani'; font-size: 15px; text-transform: uppercase;
            color: var(--text); margin: 16px 0 8px; letter-spacing: 1px;
        }
        .perf-note-content strong { color: var(--blue); }
        .perf-note-content hr { border: none; border-top: 1px solid var(--border2); margin: 16px 0; }

        /* ── SECTION 7: INTEL INJECTION ──────────────────── */
        .intel-wrap { margin-bottom: 48px; }
        .intel-terminal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-left: 3px solid var(--amber);
            border-radius: 8px;
            padding: 24px;
        }
        .intel-terminal textarea {
            width: 100%; box-sizing: border-box;
            background: var(--bg); border: 1px solid var(--border2);
            color: var(--muted); font-family: 'JetBrains Mono'; font-size: 12px;
            padding: 12px; border-radius: 5px; min-height: 110px;
            resize: vertical; outline: none;
        }
        .intel-terminal textarea:focus { border-color: var(--amber); }
        .intel-submit {
            margin-top: 12px;
            background: rgba(245,158,11,0.08);
            color: var(--amber);
            border: 1px solid rgba(245,158,11,0.3);
            padding: 10px 24px;
            border-radius: 5px;
            font-family: 'JetBrains Mono';
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .intel-submit:hover { background: rgba(245,158,11,0.18); }
        .intel-console {
            margin-top: 14px;
            font-family: 'JetBrains Mono';
            font-size: 12px;
            color: var(--green);
            display: none;
        }

        /* ── LOADING OVERLAY ─────────────────────────────── */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,5,5,0.92); z-index: 50;
            display: flex; justify-content: center; align-items: center;
            font-family: 'JetBrains Mono'; color: var(--blue);
            font-size: 13px; letter-spacing: 2px;
        }

        @media (max-width: 640px) {
            .page-wrap { padding: 32px 20px 60px; }
            .narrative-text { font-size: 16px; }
            .wave-bar, .jewel-bar { gap: 12px; }
        }
    </style>
</head>
<body>
    {% include 'nav.html' %}

    <div id="loader" class="loading-overlay">/// LOADING BRIEF...</div>

    <div class="page-wrap">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <span class="page-title">Morning Brief // BTC/USDT</span>
            <span class="page-date" id="briefDate">—</span>
        </div>

        <!-- SECTION 1: THE NARRATIVE -->
        <div class="narrative-block" id="narrativeBlock">
            <p class="narrative-placeholder">Loading today's brief...</p>
        </div>

        <!-- SECTION 2: WAVE STATE BAR -->
        <div id="waveBar" style="display:none; margin-bottom:16px;">
            <div class="wave-bar">
                <div class="wave-label-pill" id="waveLabel">—</div>
                <div class="wave-status-pill" id="waveStatus">ACTIVE</div>
                <div class="wave-completion">
                    <div class="completion-bar-wrap">
                        <div class="completion-bar-fill" id="completionFill" style="width:0%"></div>
                    </div>
                    <span class="completion-pct" id="completionPct">—%</span>
                </div>
                <div class="wave-levels">
                    <span class="origin" id="waveOrigin">—</span>
                    <span class="arrow">→</span>
                    <span class="target" id="waveTarget">—</span>
                </div>
                <div class="wave-invalidation">INVALIDATES &nbsp;<span id="waveInvalidation">—</span></div>
            </div>
        </div>

        <!-- SECTION 3: JEWEL STATUS -->
        <div id="jewelBar" style="display:none; margin-bottom:48px;">
            <div class="jewel-bar">
                <div id="jewelGateBadge" class="jewel-gate-closed">GATE —</div>
                <div class="jewel-meta" id="jewelMeta"></div>
                <div class="jewel-summary" id="jewelSummary"></div>
            </div>
        </div>

        <!-- SECTION 4: THE TACTICAL SETUP -->
        <div id="tacticalBlock" style="display:none; margin-bottom:48px;">
            <div class="section-label">Tactical Setup</div>
            <div class="tactical-block">
                <div class="tactical-content" id="tacticalContent"></div>
            </div>
        </div>

        <!-- SECTION 5: OPERATOR COMMLINK -->
        <div class="commlink-wrap">
            <div class="section-label">Ask the Senior Analyst</div>
            <div class="commlink-terminal">
                <div class="chat-window" id="chatWindow">
                    <div class="chat-bubble chat-analyst">
                        <strong>SENIOR ANALYST:</strong> Brief is ready. How can I help?
                    </div>
                </div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" class="chat-input"
                        placeholder="Ask about the setup, wave structure, or any level..."
                        onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="chat-send" onclick="sendMessage()" id="chatSendBtn">SEND</button>
                </div>
            </div>
        </div>

        <!-- SECTION 6: PERFORMANCE NOTE (collapsible) -->
        <div class="perf-note-wrap" id="perfNoteWrap" style="display:none;">
            <button class="collapsible-toggle" onclick="togglePerfNote(this)">
                <span>Last Week's Correction</span>
                <span id="perfIcon">▼</span>
            </button>
            <div class="collapsible-body" id="perfNoteBody"></div>
        </div>

        <!-- SECTION 7: EXTERNAL INTEL INJECTION -->
        <div class="intel-wrap">
            <div class="collapsible-toggle" onclick="toggleIntel(this)" style="border-radius:8px; margin-bottom:0;">
                <span>External Intel Injection</span>
                <span id="intelIcon">▼</span>
            </div>
            <div class="collapsible-body" id="intelBody">
                <div class="intel-terminal" style="border:none; padding:0; background:transparent;">
                    <textarea id="foreignIntelInput"
                        placeholder="Paste MetaSignals raw text here...&#10;Example: BTC | USDT @ $76,821.20 - 1H - 1.1 G1&#10;Target 1: 77,870.68..."></textarea>
                    <button class="intel-submit" onclick="submitForeignIntel()">Audit Intel</button>
                    <div class="intel-console" id="intelResponseConsole"></div>
                </div>
            </div>
        </div>

    </div><!-- end .page-wrap -->

    <script>
        const SYMBOL = "BTC/USDT";

        // ── COLLAPSIBLES ─────────────────────────────────────────────────
        function togglePerfNote(btn) {
            const body = document.getElementById('perfNoteBody');
            const icon = document.getElementById('perfIcon');
            const open = body.classList.toggle('open');
            icon.textContent = open ? '▲' : '▼';
        }

        function toggleIntel(btn) {
            const body = document.getElementById('intelBody');
            const icon = document.getElementById('intelIcon');
            const open = body.classList.toggle('open');
            icon.textContent = open ? '▲' : '▼';
        }

        // ── FORMAT HELPERS ───────────────────────────────────────────────
        function fmt(n) {
            if (n == null) return '—';
            return parseFloat(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function renderTactical(text) {
            if (!text) return '';
            return text.split('\n').map(line => {
                const esc = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                if (line.includes('★') || /HIGHER PROBABILITY/i.test(line)) {
                    return `<div class="starred-line">${esc}</div>`;
                }
                return `<div>${esc}</div>`;
            }).join('');
        }

        // ── LOAD NARRATIVE DATA ──────────────────────────────────────────
        async function loadBrief() {
            try {
                const res  = await fetch(`/api/narrative/latest?symbol=${encodeURIComponent(SYMBOL)}`);
                const data = await res.json();

                if (!data.ok) throw new Error(data.error || 'API error');

                // Date header
                const dateStr = data.date_key || '—';
                document.getElementById('briefDate').textContent = dateStr;

                // SECTION 1 — Narrative
                const narBlock = document.getElementById('narrativeBlock');
                const narText  = data.narrative && data.narrative.narrative_text;
                const narDate  = data.narrative && data.narrative.date_key;
                const today    = new Date().toISOString().slice(0, 10);

                if (narText) {
                    const staleNote = (narDate && narDate !== today)
                        ? `<div class="narrative-stale">Yesterday's brief — ${narDate}</div>`
                        : '';
                    narBlock.innerHTML = staleNote + `<p class="narrative-text">${narText.replace(/\n/g, '<br>')}</p>`;
                } else {
                    narBlock.innerHTML = `<p class="narrative-placeholder">Today's brief is being prepared. Check back after 9:00 AM ET.</p>`;
                }

                // SECTION 2 — Wave State Bar
                if (data.wave && data.wave.wave_label) {
                    const w = data.wave;
                    document.getElementById('waveLabel').textContent  = (w.wave_label || '—').replace(/_/g, ' ');
                    document.getElementById('waveStatus').textContent = w.wave_status || 'ACTIVE';
                    const pct = w.completion_pct != null ? parseFloat(w.completion_pct) : null;
                    document.getElementById('completionPct').textContent  = pct != null ? pct.toFixed(1) + '%' : '—%';
                    document.getElementById('completionFill').style.width = pct != null ? Math.min(pct, 100) + '%' : '0%';
                    document.getElementById('waveOrigin').textContent      = w.wave_origin_price  ? '$' + fmt(w.wave_origin_price)  : '—';
                    document.getElementById('waveTarget').textContent      = w.wave_target_price  ? '$' + fmt(w.wave_target_price)  : '—';
                    document.getElementById('waveInvalidation').textContent = w.invalidation_price ? '$' + fmt(w.invalidation_price) : '—';
                    document.getElementById('waveBar').style.display = 'block';
                }

                // SECTION 3 — JEWEL Status Bar
                if (data.jewel) {
                    const j = data.jewel;
                    const gateEl = document.getElementById('jewelGateBadge');
                    if (j.jewel_gate_open) {
                        gateEl.textContent  = 'GATE OPEN';
                        gateEl.className    = 'jewel-gate-open';
                    } else {
                        gateEl.textContent  = 'GATE CLOSED';
                        gateEl.className    = 'jewel-gate-closed';
                    }

                    const dirClass = (j.dominant_direction === 'BULLISH') ? 'chip-dir-bull'
                                   : (j.dominant_direction === 'BEARISH') ? 'chip-dir-bear' : 'chip-dir-neut';
                    const convClass = (j.jewel_conviction === 'STRONG')   ? 'chip-conv-str'
                                    : (j.jewel_conviction === 'MODERATE') ? 'chip-conv-mod' : 'chip-conv-low';

                    let metaHtml = `<span class="jewel-chip ${dirClass}">${j.dominant_direction || '—'}</span>`;
                    metaHtml    += `<span class="jewel-chip ${convClass}">${j.jewel_conviction || '—'}</span>`;
                    if (j.jewel_exit_warning)      metaHtml += `<span class="jewel-chip chip-warn-exit">Exit Warning</span>`;
                    if (j.jewel_divergence_warning) metaHtml += `<span class="jewel-chip chip-warn-div">Divergence</span>`;

                    document.getElementById('jewelMeta').innerHTML    = metaHtml;
                    document.getElementById('jewelSummary').textContent = j.jewel_signal_summary || '';
                    document.getElementById('jewelBar').style.display   = 'block';
                }

                // SECTION 4 — Tactical Setup
                const tacText = data.narrative && data.narrative.tactical_text;
                if (tacText) {
                    document.getElementById('tacticalContent').innerHTML = renderTactical(tacText);
                    document.getElementById('tacticalBlock').style.display = 'block';
                }

                // SECTION 6 — Performance Note
                const perfNote = data.narrative && data.narrative.performance_note;
                if (perfNote) {
                    document.getElementById('perfNoteBody').innerHTML = `<div class="perf-note-content">${marked.parse(perfNote)}</div>`;
                    document.getElementById('perfNoteWrap').style.display = 'block';
                }

            } catch (e) {
                console.error('loadBrief error:', e);
                document.getElementById('narrativeBlock').innerHTML =
                    `<p class="narrative-placeholder">Brief unavailable. Check server logs.</p>`;
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        // ── CHAT ─────────────────────────────────────────────────────────
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg   = input.value.trim();
            if (!msg) return;

            const win = document.getElementById('chatWindow');
            const btn = document.getElementById('chatSendBtn');

            const userBubble = document.createElement('div');
            userBubble.className = 'chat-bubble chat-user';
            userBubble.textContent = msg;
            win.appendChild(userBubble);

            input.value   = '';
            btn.disabled  = true;
            btn.textContent = '...';
            win.scrollTop = win.scrollHeight;

            try {
                const res  = await fetch('/api/research/chat-mas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol: SYMBOL, message: msg }),
                });
                const data = await res.json();

                const reply = document.createElement('div');
                reply.className = 'chat-bubble chat-analyst';
                if (data.ok) {
                    reply.innerHTML = `<strong>SENIOR ANALYST:</strong> ${data.reply.replace(/\n/g,'<br>')}`;
                } else {
                    reply.style.color = 'var(--red)';
                    reply.textContent = 'Uplink failed. Try again.';
                }
                win.appendChild(reply);
            } catch (e) {
                const err = document.createElement('div');
                err.className = 'chat-bubble chat-analyst';
                err.style.color = 'var(--red)';
                err.textContent = 'Connection lost.';
                win.appendChild(err);
            } finally {
                btn.disabled    = false;
                btn.textContent = 'SEND';
                win.scrollTop   = win.scrollHeight;
            }
        }

        // ── INTEL INJECTION ──────────────────────────────────────────────
        async function submitForeignIntel() {
            const rawText   = document.getElementById('foreignIntelInput').value;
            const consoleEl = document.getElementById('intelResponseConsole');
            if (!rawText.trim()) {
                consoleEl.style.display = 'block';
                consoleEl.style.color   = 'var(--red)';
                consoleEl.textContent   = '> ERROR: No intel provided.';
                return;
            }
            consoleEl.style.display = 'block';
            consoleEl.style.color   = 'var(--amber)';
            consoleEl.textContent   = '> Transmitting to backend parser...';

            try {
                const res  = await fetch('/api/research/audit-intel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_text: rawText }),
                });
                const data = await res.json();
                if (data.ok) {
                    const a = data.audit;
                    const verdictColor = a.overall_verdict === 'REJECTED' ? 'var(--red)'
                                       : a.overall_verdict === 'CAUTION'  ? 'var(--amber)' : 'var(--green)';
                    const t1 = typeof a.measured_move_t1 === 'number' ? '$' + a.measured_move_t1.toFixed(2) : 'N/A';
                    consoleEl.innerHTML = `
                        <div style="border:1px solid ${verdictColor}; padding:14px; border-radius:6px; background:rgba(0,0,0,0.3);">
                            <div style="font-weight:800; color:#fff; margin-bottom:10px;">
                                VERDICT: <span style="color:${verdictColor};">${a.overall_verdict || '—'}</span>
                            </div>
                            <div style="color:var(--blue); margin-bottom:8px;">MEASURED MOVE T1: ${t1}</div>
                            <div style="color:var(--muted); line-height:1.5; border-top:1px dashed var(--border2); padding-top:10px;">> ${a.reasoning || ''}</div>
                        </div>`;
                    document.getElementById('foreignIntelInput').value = '';
                } else {
                    consoleEl.style.color = 'var(--red)';
                    consoleEl.textContent = `> ERROR: ${data.error}`;
                }
            } catch (e) {
                consoleEl.style.color = 'var(--red)';
                consoleEl.textContent = '> CRITICAL ERROR: Uplink failed.';
            }
        }

        document.addEventListener('DOMContentLoaded', loadBrief);
    </script>
</body>
</html>
